# Docker Compose configuration for local development and deployment
# Orchestrates backend, frontend, and PostgreSQL services

services:
  # PostgreSQL database service
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ResearchGate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rishi9899}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-rishi9899}@db:5432/ResearchGate
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: "*"
      APP_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # React frontend served by Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
